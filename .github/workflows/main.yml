name: main

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message. What changes were made?'
        required: false
        default: 'Updated Figma'
      version:
        description: 'Which version of the Figma document to use?'
        required: false
        default: '' # Will use latest if not set

# Needed so the workflow can push the generated tokens back to the repo
permissions:
  contents: write

jobs:
  build-unix:
    runs-on: ubuntu-latest

    steps:
      - name: Inputs
        id: input-messages
        run: |
          echo "MESSAGE ---> '${{ github.event.inputs.message }}'"
          echo "VERSION ---> '${{ github.event.inputs.version }}'"

      - name: Checkout
        id: checkout
        uses: actions/checkout@v3

      - name: Use Node.js 18.x
        id: node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Figmagic
        id: install
        run: npm install -D figmagic

      # ---------------------------------------------------------------
      # figmagic only accepts the raw file key, not the full Figma URL.
      # This step extracts the key from URLs like:
      #   https://www.figma.com/design/FILEID/name
      #   https://www.figma.com/file/FILEID/name
      # or passes the value as-is if it's already just the key.
      # ---------------------------------------------------------------

      - name: Extract Figma file key
        id: figma-key
        run: |
          RAW="${{ secrets.FIGMA_URL }}"
          # Extract the segment after /design/ or /file/
          KEY=$(echo "$RAW" | sed -E 's|.*/(design|file)/([^/?]+).*|\2|')
          # If nothing was extracted (no URL path match), use the raw value as-is
          if [ -z "$KEY" ] || [ "$KEY" = "$RAW" ]; then
            KEY="$RAW"
          fi
          echo "FIGMA_KEY=$KEY" >> "$GITHUB_ENV"
          echo "Using Figma file key: $KEY"

      - name: Run Figmagic (latest Figma data)
        id: figma-latest
        if: ${{ !github.event.inputs.version || github.event.inputs.version == 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url "$FIGMA_KEY"

      - name: Run Figmagic (named Figma version)
        id: figma-versioned
        if: ${{ github.event.inputs.version && github.event.inputs.version != 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url "$FIGMA_KEY" --versionName ${{ github.event.inputs.version }}

      - name: Diagnose figmagic output
        id: diagnose
        run: |
          echo "=== Contents of tokens/ folder ==="
          ls -la tokens/ 2>/dev/null || echo "(tokens/ folder is empty or does not exist)"
          echo ""
          echo "=== All generated token files ==="
          find . -path ./.git -prune -o -name "*.css" -print -o -name "*.json" -print 2>/dev/null | grep -v node_modules || true

      # ---------------------------------------------------------------
      # Commit the generated design tokens back to the repository.
      # This is the KEY step: without this, the color change never
      # reaches the web page.
      # ---------------------------------------------------------------

      - name: Commit updated design tokens
        id: commit-tokens
        run: |
          git config user.name "Continuous Design Bot"
          git config user.email "actions@github.com"

          # Guard: if figmagic didn't generate colors.css, fail loudly instead of deleting it.
          # Requires a Color Style named "button-color" in the Figma file.
          # See: https://github.com/mikaelvesavuori/figmagic#color-styles
          if [ ! -f "tokens/colors.css" ]; then
            echo ""
            echo "ERROR: figmagic did not generate tokens/colors.css"
            echo "--------------------------------------------------------"
            echo "Most likely causes:"
            echo "  1. FIGMA_URL secret has wrong format."
            echo "     It must be: https://www.figma.com/file/FILE_KEY/filename"
            echo "     NOT a URL with ?node-id=... at the end."
            echo ""
            echo "  2. No Color Style named 'button-color' exists in Figma."
            echo "     In Figma: select the rectangle, go to Fill,"
            echo "     click the 4-dot icon and create a style called 'button-color'."
            echo ""
            echo "  3. The Color Style exists but the Figma file has no styles at all."
            echo "     Check above in 'Diagnose figmagic output' what was generated."
            echo "--------------------------------------------------------"
            exit 1
          fi

          git add tokens/

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No token changes detected - skipping commit."
          else
            git commit -m "design: update tokens from Figma — ${{ github.event.inputs.message || 'plugin trigger' }}"
            git push
            echo "Design tokens committed and pushed."
          fi

name: main

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message. What changes were made?'
        required: false
        default: 'Updated Figma'
      version:
        description: 'Which version of the Figma document to use?'
        required: false
        default: '' # Will use latest if not set

# Needed so the workflow can push the generated tokens back to the repo
permissions:
  contents: write

jobs:
  build-unix:
    runs-on: ubuntu-latest

    steps:
      - name: Inputs
        id: input-messages
        run: |
          echo "MESSAGE ---> '${{ github.event.inputs.message }}'"
          echo "VERSION ---> '${{ github.event.inputs.version }}'"

      - name: Checkout
        id: checkout
        uses: actions/checkout@v3

      - name: Use Node.js 18.x
        id: node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Figmagic
        id: install
        run: npm install -D figmagic

      # ---------------------------------------------------------------
      # FIGMA_URL secret must be the raw file key (not the full URL).
      # Example: ZCIZD8u3CjxGlIPKgN7lg9
      # ---------------------------------------------------------------

      - name: Run Figmagic (latest Figma data)
        id: figma-latest
        if: ${{ !github.event.inputs.version || github.event.inputs.version == 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url ${{ secrets.FIGMA_URL }} --outputTokenFormat css

      - name: Run Figmagic (named Figma version)
        id: figma-versioned
        if: ${{ github.event.inputs.version && github.event.inputs.version != 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url ${{ secrets.FIGMA_URL }} --versionName ${{ github.event.inputs.version }} --outputTokenFormat css

      # ---------------------------------------------------------------
      # figmagic outputs TypeScript regardless of --outputTokenFormat.
      # This step converts every *.ts in tokens/ to its matching *.css.
      # Works for colors, fontsizes, borderradius, spacing, etc.
      # ---------------------------------------------------------------

      - name: Convert token .ts files to .css
        id: convert-tokens
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const tsFiles = fs.readdirSync('tokens').filter(f => f.endsWith('.ts'));
          console.log('Token files found:', tsFiles);

          if (tsFiles.length === 0) {
            console.error('ERROR: figmagic generated no token files.');
            process.exit(1);
          }

          // figmagic format: const <name> = { "camelKey": "value" } as const;
          const toCssVar = k => '--' + k.replace(/([A-Z])/g, (_, c) => '-' + c.toLowerCase());

          let total = 0;
          for (const tsFile of tsFiles) {
            const src = fs.readFileSync(path.join('tokens', tsFile), 'utf8');
            const match = src.match(/const\s+\w+\s*=\s*(\{[\s\S]*?\})\s*(?:as\s+const)?\s*;/);
            if (!match) { console.log(tsFile + ': no object found, skipping'); continue; }

            const obj = JSON.parse(match[1]);
            const lines = Object.entries(obj)
              .map(([k, v]) => '  ' + toCssVar(k) + ': ' + v + ';');

            if (lines.length === 0) { console.log(tsFile + ': empty object, skipping'); continue; }

            const cssFile = tsFile.replace('.ts', '.css');
            const css = ':root {\n' + lines.join('\n') + '\n}\n';
            fs.writeFileSync(path.join('tokens', cssFile), css);
            console.log('Generated ' + cssFile + ':\n' + css);
            total += lines.length;
          }

          if (total === 0) { console.error('ERROR: no tokens converted.'); process.exit(1); }
          EOF

      - name: Diagnose figmagic output
        id: diagnose
        run: |
          echo "=== Contents of tokens/ folder ==="
          ls -la tokens/ 2>/dev/null || echo "(tokens/ folder is empty or does not exist)"

      # ---------------------------------------------------------------
      # Commit the generated design tokens back to the repository.
      # ---------------------------------------------------------------

      - name: Commit updated design tokens
        id: commit-tokens
        run: |
          git config user.name "Continuous Design Bot"
          git config user.email "actions@github.com"

          if [ ! -f "tokens/colors.css" ]; then
            echo "ERROR: tokens/colors.css was not generated or converted."
            exit 1
          fi

          git add tokens/

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No token changes detected - skipping commit."
          else
            git commit -m "design: update tokens from Figma — ${{ github.event.inputs.message || 'plugin trigger' }}"
            git push
            echo "Design tokens committed and pushed."
          fi

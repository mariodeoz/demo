name: main

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message. What changes were made?'
        required: false
        default: 'Updated Figma'
      version:
        description: 'Which version of the Figma document to use?'
        required: false
        default: '' # Will use latest if not set

# Needed so the workflow can push the generated tokens back to the repo
permissions:
  contents: write

jobs:
  build-unix:
    runs-on: ubuntu-latest

    steps:
      - name: Inputs
        id: input-messages
        run: |
          echo "MESSAGE ---> '${{ github.event.inputs.message }}'"
          echo "VERSION ---> '${{ github.event.inputs.version }}'"

      - name: Checkout
        id: checkout
        uses: actions/checkout@v3

      - name: Use Node.js 18.x
        id: node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Figmagic
        id: install
        run: npm install -D figmagic

      # ---------------------------------------------------------------
      # Run figmagic to pull design tokens from Figma.
      # figmagic reads Color Styles from the Figma file and writes
      # CSS custom properties to tokens/colors.css (and other token files).
      #
      # IMPORTANT: In Figma, create a Color Style named "button-color".
      # figmagic will generate:  --button-color: #<hex>;  in tokens/colors.css
      # ---------------------------------------------------------------

      - name: Run Figmagic (latest Figma data)
        id: figma-latest
        if: ${{ !github.event.inputs.version || github.event.inputs.version == 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url ${{ secrets.FIGMA_URL }}

      - name: Run Figmagic (named Figma version)
        id: figma-versioned
        if: ${{ github.event.inputs.version && github.event.inputs.version != 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url ${{ secrets.FIGMA_URL }} --versionName ${{ github.event.inputs.version }}

      # ---------------------------------------------------------------
      # Commit the generated design tokens back to the repository.
      # This is the KEY step: without this, the color change never
      # reaches the web page.
      # ---------------------------------------------------------------

      - name: Commit updated design tokens
        id: commit-tokens
        run: |
          git config user.name "Continuous Design Bot"
          git config user.email "actions@github.com"

          # Guard: if figmagic didn't generate colors.css, fail loudly instead of deleting it.
          # This happens when the Figma file is missing the "Design tokens" page + "Colors" frame.
          if [ ! -f "tokens/colors.css" ]; then
            echo ""
            echo "ERROR: figmagic did not generate tokens/colors.css"
            echo "--------------------------------------------------------"
            echo "In your Figma file you need:"
            echo "  1. A PAGE named exactly: Design tokens"
            echo "  2. A FRAME inside it named: Colors"
            echo "  3. A RECTANGLE inside Colors named: button-color"
            echo "     with the fill color you want for the button"
            echo "--------------------------------------------------------"
            exit 1
          fi

          git add tokens/

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No token changes detected - skipping commit."
          else
            git commit -m "design: update tokens from Figma — ${{ github.event.inputs.message || 'plugin trigger' }}"
            git push
            echo "Design tokens committed and pushed."
          fi

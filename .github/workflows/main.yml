name: main

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message. What changes were made?'
        required: false
        default: 'Updated Figma'
      version:
        description: 'Which version of the Figma document to use?'
        required: false
        default: '' # Will use latest if not set

# Needed so the workflow can push the generated tokens back to the repo
permissions:
  contents: write

jobs:
  build-unix:
    runs-on: ubuntu-latest

    steps:
      - name: Inputs
        id: input-messages
        run: |
          echo "MESSAGE ---> '${{ github.event.inputs.message }}'"
          echo "VERSION ---> '${{ github.event.inputs.version }}'"

      - name: Checkout
        id: checkout
        uses: actions/checkout@v3

      - name: Use Node.js 18.x
        id: node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Figmagic
        id: install
        run: npm install -D figmagic

      # ---------------------------------------------------------------
      # FIGMA_URL secret must be the raw file key (not the full URL).
      # Example: ZCIZD8u3CjxGlIPKgN7lg9
      # ---------------------------------------------------------------

      - name: Run Figmagic (latest Figma data)
        id: figma-latest
        if: ${{ !github.event.inputs.version || github.event.inputs.version == 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url ${{ secrets.FIGMA_URL }} --outputTokenFormat css

      - name: Run Figmagic (named Figma version)
        id: figma-versioned
        if: ${{ github.event.inputs.version && github.event.inputs.version != 'Latest' }}
        run: npx figmagic --token ${{ secrets.FIGMA_TOKEN }} --url ${{ secrets.FIGMA_URL }} --versionName ${{ github.event.inputs.version }} --outputTokenFormat css

      # ---------------------------------------------------------------
      # figmagic ignores --outputTokenFormat in some versions and always
      # outputs colors.ts. This step converts it to colors.css so the
      # rest of the pipeline can use standard CSS custom properties.
      # ---------------------------------------------------------------

      - name: Convert colors.ts to colors.css
        id: convert-tokens
        run: |
          if [ ! -f "tokens/colors.ts" ]; then
            echo "tokens/colors.ts not found — nothing to convert."
            exit 0
          fi
          echo "=== colors.ts content ==="
          cat tokens/colors.ts
          node - <<'EOF'
          const fs = require('fs');
          const src = fs.readFileSync('tokens/colors.ts', 'utf8');
          const lines = [];

          // Format A: export const colors = { "buttonColor": "#hex" };
          const objMatch = src.match(/export\s+const\s+colors\s*=\s*(\{[\s\S]*?\});/);
          if (objMatch) {
            const obj = JSON.parse(objMatch[1]);
            for (const [k, v] of Object.entries(obj)) {
              const name = '--' + k.replace(/([A-Z])/g, (_, c) => '-' + c.toLowerCase());
              lines.push('  ' + name + ': ' + v + ';');
            }
          } else {
            // Format B: export const buttonColor = "#hex";
            for (const [, k, v] of src.matchAll(/export\s+const\s+(\w+)\s*=\s*["']([^"']+)["'];/g)) {
              const name = '--' + k.replace(/([A-Z])/g, (_, c) => '-' + c.toLowerCase());
              lines.push('  ' + name + ': ' + v + ';');
            }
          }

          if (lines.length === 0) {
            console.error('ERROR: could not parse any color tokens from colors.ts');
            process.exit(1);
          }

          const css = ':root {\n' + lines.join('\n') + '\n}\n';
          fs.writeFileSync('tokens/colors.css', css);
          console.log('=== Generated colors.css ===\n' + css);
          EOF

      - name: Diagnose figmagic output
        id: diagnose
        run: |
          echo "=== Contents of tokens/ folder ==="
          ls -la tokens/ 2>/dev/null || echo "(tokens/ folder is empty or does not exist)"

      # ---------------------------------------------------------------
      # Commit the generated design tokens back to the repository.
      # ---------------------------------------------------------------

      - name: Commit updated design tokens
        id: commit-tokens
        run: |
          git config user.name "Continuous Design Bot"
          git config user.email "actions@github.com"

          if [ ! -f "tokens/colors.css" ]; then
            echo "ERROR: tokens/colors.css was not generated or converted."
            exit 1
          fi

          git add tokens/

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No token changes detected - skipping commit."
          else
            git commit -m "design: update tokens from Figma — ${{ github.event.inputs.message || 'plugin trigger' }}"
            git push
            echo "Design tokens committed and pushed."
          fi
